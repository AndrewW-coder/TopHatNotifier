<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top Hat Watcher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2e2e2e;
      --accent: #f5c518;
      --text: #e8e8e8;
      --muted: #666;
      --on: #4ade80;
      --off: #444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      width: 300px;
      padding: 1.25rem;
    }

    .header {
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .toggle-row:last-child {
      border-bottom: none;
    }

    .toggle-row:hover {
      background: rgba(255,255,255,0.03);
    }

    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .toggle-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }

    .toggle-desc {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 300;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--off);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 4px;
      top: 4px;
      background: white;
      border-radius: 50%;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    input:checked + .slider {
      background: var(--on);
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    .status {
      margin-top: 0.85rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status.visible {
      opacity: 1;
      color: var(--on);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="label">Active on tophat.com</div>
    <h1>Top Hat Question Watcher</h1>
  </div>

  <div class="card">
    <div class="toggle-row">
      <div class="toggle-info">
        <span class="toggle-title">Sound Alert</span>
        <span class="toggle-desc">Play a sound when a question appears</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="soundToggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-info">
        <span class="toggle-title">Popup Notification</span>
        <span class="toggle-desc">Show an OS notification with the question</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="popupToggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="status" id="status">SETTINGS SAVED</div>

  <script src = "popup.js"></script>
</body>
</html>
